version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && python main.py"

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin -d robin_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
