services:
  - type: web
    name: nico-robin-bot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m src.bot.main
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: MODERATION_PROVIDER
        value: traditional_ml
      - key: AI_MODERATION_ENABLED
        value: "true"
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: nico-robin-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A src.bot.tasks.celery_app:celery_app worker --loglevel=info
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: nico-robin-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A src.bot.tasks.celery_app:celery_app beat --loglevel=info
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: redis
    name: nico-robin-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: nico-robin-db
    plan: starter
    databaseName: robin_db
    user: robin
