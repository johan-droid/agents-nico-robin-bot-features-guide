version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nico-robin-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://robin:password@db:5432/robin_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && python main.py"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./:/app  # For development; comment out for production

  db:
    image: postgres:15-alpine
    container_name: nico-robin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin -d robin_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    # Comment out the port mapping below for production
    ports:
      - "5432:5432"

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
