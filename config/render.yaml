services:
  - type: web
    name: nico-robin-bot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: python main.py
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: disabled
      - key: AI_MODERATION_ENABLED
        value: "false"

  - type: worker
    name: nico-robin-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A tasks.celery_app worker --loglevel=info
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString

  - type: worker
    name: nico-robin-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A tasks.celery_app beat --loglevel=info
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString

  - type: redis
    name: nico-robin-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: nico-robin-db
    plan: starter
    databaseName: robin_db
    user: robin
